<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">  
  <link rel="icon" href="#" title="png/icon">
  <title>VA Portfolio</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <!-- AOS -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-800">

  <!-- CONTENT HERE -->
   <section class="text-center py-20 bg-white">
  <h1 class="text-4xl font-bold mb-4">
    Hi, I’m Maria — Your Reliable Virtual Assistant
  </h1>
  <p class="mb-6 text-lg">
    Helping you stay organized and stress-free
  </p>
  <a href="#contact" class="bg-blue-600 text-white px-6 py-3 rounded-xl">
    Hire Me
  </a>
</section>

<section class="py-16 text-center" data-aos="fade-up">
  <h2 class="text-2xl font-semibold mb-6">Services I Offer</h2>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-6 px-6">
    <div class="bg-white p-6 rounded-xl shadow">Email Management</div>
    <div class="bg-white p-6 rounded-xl shadow">Calendar Management</div>
    <div class="bg-white p-6 rounded-xl shadow">Social Media Assistance</div>
  </div>
</section>

<section id="contact" class="py-16 text-center">
  <h2 class="text-2xl font-semibold mb-6">Contact Me</h2>

  <form id="contact-form" class="max-w-md mx-auto space-y-4">
    <input type="text" name="name" placeholder="Your Name" class="w-full p-3 border rounded">
    <input type="email" name="email" placeholder="Your Email" class="w-full p-3 border rounded">
    <textarea name="message" placeholder="Message" class="w-full p-3 border rounded"></textarea>

    <button type="submit" class="bg-blue-600 text-white px-6 py-3 rounded-xl">
      Send Message
    </button>
  </form>
</section>



  <!-- AOS Script -->
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script>
    AOS.init();
  </script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
  (function(){
    emailjs.init("m00a6hKbZ8S6KnXq-");
  })();
</script>

<script>
  document.getElementById("contact-form").addEventListener("submit", function(e) {
    e.preventDefault();

    emailjs.sendForm("service_z24x1iz", "template_r213v6j", this)
      .then(function() {
        alert("Message sent successfully!");
      }, function(error) {
        alert("Failed to send message.");
      });
  });
</script>
</body>
</html>
